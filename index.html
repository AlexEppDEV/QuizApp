<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
    <script src="./scripts/array.js"></script>

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body onload="init()">
    <section class="app">

        <div class="container category-bar dpf-jd-flex-direction ">
            <nav class="navbar ">
                <div class="container-fluid dpf-center">
                    <img src="./assets/icon/logo.png" alt="">               
                </div>
            </nav>
            <div class="card-body" id="category_body">                   
                    <div class="card mb-2">
                        <div class="card-body answers-question-card" id="category_0" onclick="category('category-0')">
                            <b>Star Trek TNG</b>
                        </div>
                    </div>

                    <div class="card mb-2">
                        <div class="card-body answers-question-card" id="category_1"  onclick="category('category-1')">
                            <b>Star Wars</b>
                        </div>
                    </div>

                    <div class="card mb-2">
                        <div class="card-body answers-question-card" id="category_2"  onclick="category('category-2')">
                            <b>Stargate</b>
                        </div>
                    </div>

                    <div class="card mb-2">
                        <div class="card-body answers-question-card" id="category_3" onclick="category('category-3')">
                            <b>Expanse</b>
                        </div>
                    </div>
                </div>

        </div>
        <!-- As a heading -->
        

        <main class="container dpf-jc-flex-start" style="width: auto;">
            <div class="card quiz-card" >
                <!-- <img src="./assets/img/main-logo.jpg" class="card-img-top" alt="..."> -->

                <div class="card-body " id="endScreen" style="display: none;">
                    <div class="dpf-center">
                        <img src="./assets/icon/brain result.png" alt="">
                        <h3>Complete Quiz</h3>
                        <!-- <span>
                                <b id="quest-number"></b> bis <b id="quest-max-number"></b> fragen
                        </span> -->
                    </div>
                   
                    <div class="quiz-footer">
                        
                        
                        <button 
                         type="button" 
                         id="back-category" 
                         
                         class="btn btn-danger" 
                         onclick="nextCategory()"><b>REPLAY</b></button>

                        <button 
                         type="button" 
                         id="next-category" 
                         
                         class="btn btn-success" 
                         onclick="nextCategory()"><b>SHARE</b></button>
                    </div>
                
                </div>

                <div class="container card-body" id="questionBody">
                    <h5 class="card-title" id="answersQuestionID" style="text-align: center;">Fragen</h5>
                    
                    <div class="card mb-2">
                        <div class="card-body answers-question-card" id="answers_0" onclick="answers('answers-0')">
                            antwort
                        </div>
                    </div>

                    <div class="card mb-2">
                        <div class="card-body answers-question-card" id="answers_1"  onclick="answers('answers-1')">
                            antwort
                        </div>
                    </div>

                    <div class="card mb-2">
                        <div class="card-body answers-question-card" id="answers_2"  onclick="answers('answers-2')">
                            antwort
                        </div>
                    </div>

                    <div class="card mb-2">
                        <div class="card-body answers-question-card" id="answers_3" onclick="answers('answers-3')">
                            antwort
                        </div>
                    </div>
                    <!-- <a href="#" class="btn btn-primary">Go somewhere</a> -->
                    <div class="quiz-footer">
                        <span>
                            <b id="quest-number"></b> bis <b id="quest-max-number"></b> fragen
                        </span>

                        <button type="button" id="next-answers" disabled class="btn btn-primary" onclick="nextQuestion()">nächste frage</button>
                    </div>
                </div>
               
            </div>
           
        </main>

    </section>
    
</body>
<script src="./script.js"></script>
</html>
