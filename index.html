<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
    <script src="./scripts/array.js"></script>

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body onload="init()" class="dpf-center">
    <section class="app">

        <div class="container category-bar dpf-jd-flex-direction ">
            <nav class="navbar ">
                <div class="container-fluid dpf-center">
                    <img src="./assets/icon/logo.png" alt="">               
                </div>
            </nav>
            <div class="card-body" id="category_body">                   
                    <div class="card mb-2">
                        <div class="card-body answers-question-card" id="category_0" onclick="navCategory('category-0')">
                            <b>Star Trek TNG</b>
                        </div>
                    </div>

                    <div class="card mb-2">
                        <div class="card-body answers-question-card" id="category_1"  onclick="navCategory('category-1')">
                            <b>Star Wars</b>
                        </div>
                    </div>

                    <div class="card mb-2">
                        <div class="card-body answers-question-card" id="category_2"  onclick="navCategory('category-2')">
                            <b>Stargate SG1</b>
                        </div>
                    </div>

                    <div class="card mb-2">
                        <div class="card-body answers-question-card" id="category_3" onclick="navCategory('category-3')">
                            <b>The Expanse</b>
                        </div>
                    </div>
                </div>

        </div>
        <!-- As a heading -->
    
        <main class="container dpf-jc-flex-start" style="width: auto;">
            

             <!-- start screen -->
            <div class="card quiz-card start-screen" >
                 <div class="card-body" id="startScreen" >
                    <div class="dpf-jd-flex-direction">
                        <h2>Welcome to</h2>
                        <h2>The Awesome <span id="titleCategory"></span></h2>
                        <p>Ready to next Challenge?</p>
                    </div>                   
                    <div class="quiz-footer dpf-jc-flex-end">

                        <button 
                            type="button" 
                            id="next-category" 
                            class="btn btn-success " 
                            onclick="startChallenge()">
                            <b>Start Now ></b></button>
                    </div>              
                </div>


                <!-- frage und antwort -->
                <div class="container card-body" id="questionBody" style="display: none;">
                    <h5 class="card-title" id="answersQuestionID" style="text-align: center;">Fragen</h5>                   
                    <div class="card mb-2">
                        <div class="card-body answers-question-card" id="answers_0" onclick="answers('answers-0')">
                            antwort
                        </div>
                    </div>

                    <div class="card mb-2">
                        <div class="card-body answers-question-card" id="answers_1"  onclick="answers('answers-1')">
                            antwort
                        </div>
                    </div>

                    <div class="card mb-2">
                        <div class="card-body answers-question-card" id="answers_2"  onclick="answers('answers-2')">
                            antwort
                        </div>
                    </div>

                    <div class="card mb-2">
                        <div class="card-body answers-question-card" id="answers_3" onclick="answers('answers-3')">
                            antwort
                        </div>
                    </div>

                    <div class="quiz-footer">
                        <span>
                            <b id="quest-number"></b> bis <b id="quest-max-number"></b> fragen
                        </span>
                        <button type="button" id="next-answers" disabled class="btn btn-primary" onclick="nextQuestion()">nächste frage</button>
                    </div>
                    <div class="progress" role="progressbar" aria-label="Example with label" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
                        <div class="progress-bar" style="width: 25%">25%</div>
                    </div>
                </div>

                <!-- end screen -->
                <div class="card-body end-screen" id="endScreen" style="display: none;">
                    <div class="dpf-jd-flex-direction">
                        <img src="./assets/icon/brain result.png" alt="">
                        <h3>Complete Quiz</h3>
                        <!-- punkte stand -->
                        <span>
                                <b id="quest_number_right"></b> von <b id="quest_max_number_right"></b> fragen
                        </span>
                    </div>                   
                    <div class="quiz-footer">
                        <button 
                            type="button" 
                            id="back-category" 
                            class="btn btn-danger" 
                            onclick="replayCategory()">
                            <b>REPLAY</b></button>

                        <button 
                            type="button" 
                            id="next-category"                         
                            class="btn btn-success" 
                            onclick="shareCategory()">
                            <b>SHARE</b></button>
                    </div>              
                </div>
                

            </div>          
        </main>

    </section>
    
</body>
<script src="./script.js"></script>
</html>
